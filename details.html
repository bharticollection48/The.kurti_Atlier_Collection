<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Product Details - Al Akasha Elvy</title>
    
    <link rel="icon" type="image/png" href="https://img.freepik.com/premium-vector/shopping-logo-vector-icon_636116-200.jpg?semt=ais_hybrid&w=740&q=80"> 
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #f3047c; --dark: #1a1a1a; --light-bg: #fdf2ff; --green: #1aab2a; --wa-green: #25d366; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: #fff; color: var(--dark); user-select: none; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 12px 18px; background: white; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 15px rgba(0,0,0,0.08); }
        
        .gallery-section { padding: 8px; background: #fff; }
        .main-img-box { width: 100%; height: 460px; border-radius: 20px; overflow: hidden; background: #fefefe; display: flex; align-items: center; justify-content: center; border: 1px solid #f0f0f0; position: relative; }
        .main-img-box img { width: 100%; height: 100%; object-fit: contain; transition: transform 0.6s; }
        
        .thumb-row { display: flex; gap: 12px; margin-top: 15px; overflow-x: auto; padding: 5px; scrollbar-width: none; }
        .thumb-row::-webkit-scrollbar { display: none; }
        .thumb-card { min-width: 75px; height: 75px; border-radius: 12px; border: 2px solid #f0f0f0; overflow: hidden; cursor: pointer; flex-shrink: 0; }
        .thumb-card.active { border-color: var(--primary); transform: translateY(-3px); }
        .thumb-card img { width: 100%; height: 100%; object-fit: cover; }

        .content-box { padding: 22px; }
        .stock-tag { background: #e8f5e9; color: var(--green); padding: 5px 14px; border-radius: 50px; font-size: 11px; font-weight: 700; display: inline-flex; align-items: center; gap: 6px; }
        
        .price-container { margin: 18px 0; display: flex; align-items: center; gap: 15px; }
        .current-price { font-size: 30px; font-weight: 800; color: var(--dark); }
        .old-price { font-size: 19px; color: #aaa; text-decoration: line-through; }
        .off-tag { background: #ff4757; color: white; font-size: 14px; font-weight: 700; padding: 5px 12px; border-radius: 8px; }

        .trust-row { display: flex; justify-content: space-between; margin: 20px 0; padding: 15px; background: #f8f9fa; border-radius: 15px; }
        .trust-item { text-align: center; font-size: 10px; font-weight: 600; color: #666; }
        .trust-item i { display: block; font-size: 18px; color: var(--dark); margin-bottom: 5px; }

        .btn-size { border: 1.5px solid #eee; padding: 10px 20px; border-radius: 10px; background: white; cursor: pointer; font-weight: 600; }
        .btn-size.active { background: var(--primary); color: white; border-color: var(--primary); }

        #waFloatingBtn { position: fixed; bottom: 95px; right: 20px; background: var(--wa-green); color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; box-shadow: 0 6px 20px rgba(37,211,102,0.4); z-index: 999; text-decoration: none; }

        .bottom-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; padding: 14px; gap: 12px; box-shadow: 0 -8px 25px rgba(0,0,0,0.08); box-sizing: border-box; z-index: 1000; border-radius: 20px 20px 0 0; }
        .btn { flex: 1; height: 58px; border: none; border-radius: 15px; font-weight: 800; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-cart { background: #f1f2f6; color: var(--dark); }
        .btn-buy { background: var(--primary); color: white; }

        #loader { position: fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; display:flex; align-items:center; justify-content:center; flex-direction:column; }
        .spinner { width:45px; height:45px; border:5px solid #f3f3f3; border-top:5px solid var(--primary); border-radius:50%; animation:spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform:rotate(0deg); } 100% { transform:rotate(360deg); } }
        .share-btn { width: 42px; height: 42px; border-radius: 12px; background: #f8f9fa; display: flex; align-items: center; justify-content: center; border: 1px solid #eee; }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div><p style="margin-top:20px; font-weight:600; color:var(--primary);">PREMIUM COLLECTION...</p></div>

    <header>
        <div class="share-btn" onclick="goBack()"><i class="fa-solid fa-chevron-left"></i></div>
        <div style="text-align: center;">
            <div style="font-size: 15px; font-weight: 800; color: var(--dark); letter-spacing: 1.5px; text-transform: uppercase;">Al Akasha Elvy</div>
        </div>
        <div class="share-btn" onclick="shareProduct()"><i class="fa-solid fa-arrow-up-from-bracket"></i></div>
    </header>

    <div class="gallery-section">
        <div class="main-img-box">
            <img id="mainDisplay" src="" alt="Premium Item">
        </div>
        <div class="thumb-row" id="thumbRow"></div>
    </div>

    <div class="content-box">
        <div class="stock-tag"><i class="fa-solid fa-bolt-lightning"></i> Fast Selling - Limited Stock</div>
        
        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-top: 10px;">
            <h1 id="pName" style="font-size: 20px; margin: 0; font-weight: 600;">Loading...</h1>
            <div style="background:var(--green); color:white; padding:3px 10px; border-radius:8px; font-size:13px; font-weight:800;">
                4.5 <i class="fa-solid fa-star" style="font-size: 10px;"></i>
            </div>
        </div>

        <div class="price-container">
            <span class="current-price" id="pPrice">₹0</span>
            <span class="old-price" id="pOld">₹0</span>
            <span class="off-tag" id="pOff">OFF</span>
        </div>

        <div class="trust-row">
            <div class="trust-item"><i class="fa-solid fa-truck-fast"></i>Free Delivery</div>
            <div class="trust-item"><i class="fa-solid fa-rotate-left"></i>7 Day Return</div>
            <div class="trust-item"><i class="fa-solid fa-shield-check"></i>Verified</div>
            <div class="trust-item"><i class="fa-solid fa-hand-holding-dollar"></i>COD</div>
        </div>

        <div id="sizeArea" style="display:none; margin: 20px 0;">
            <p style="font-weight: 700; font-size: 14px; margin-bottom: 10px;">Select Size:</p>
            <div id="sizeOptions" style="display:flex; gap:10px; flex-wrap:wrap;"></div>
        </div>

        <div style="background: var(--light-bg); padding: 15px; border-radius: 15px; margin: 20px 0;">
            <h4 style="margin: 0 0 10px 0; font-size: 14px; color: var(--primary);">Product Details</h4>
            <table style="width: 100%; font-size: 13px;">
                <tr><td style="color:#777;">Brand</td><td style="font-weight:700; text-align:right;">Al Akasha Elvy</td></tr>
                <tr><td style="color:#777;">Category</td><td style="font-weight:700; text-align:right;" id="pCat">Fashion</td></tr>
                <tr><td style="color:#777;">Wash Care</td><td style="font-weight:700; text-align:right;">Hand Wash</td></tr>
            </table>
        </div>
    </div>

    <div style="padding: 20px; background: #fbfbfb; margin-bottom: 110px;">
        <h4 style="margin-bottom: 15px;">Related Products</h4>
        <div id="relatedGrid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;"></div>
    </div>

    <a id="waFloatingBtn" href="https://wa.me/917851053736" target="_blank">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <div class="bottom-bar">
        <button class="btn btn-cart" id="addToCartBtn"><i class="fa-solid fa-basket-shopping"></i> BAG</button>
        <button class="btn btn-buy" id="buyNowBtn"><i class="fa-solid fa-bolt-lightning"></i> BUY NOW</button>
    </div>

    <script>
        // --- CONFIGURATION ---
        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbw9rKH_KHDEl-STw0E1CoAL_xdqud4TMb22xccZFsNBN0xHY-pBQOCLYA3D6E8dzfgi/exec";
        const params = new URLSearchParams(window.location.search);
        const productId = params.get('id');
        let currentProduct = null;
        let selectedSize = "";

        // Navigation
        window.history.pushState({ path: window.location.href }, '', window.location.href);
        window.onpopstate = () => goBack();
        function goBack() {
            (document.referrer === "" || document.referrer.indexOf(window.location.host) === -1) 
            ? window.location.href = 'index.html' : window.history.back();
        }

        async function init() {
            try {
                // Fetch Data (GOOGLE_SHEET_URL used correctly here)
                const response = await fetch(GOOGLE_SHEET_URL + "?t=" + Date.now());
                const data = await response.json();
                
                // Latest First sorting (Same as index)
                const allProducts = (data.products || data).sort((a, b) => Number(b.id) - Number(a.id));
                localStorage.setItem('myProducts', JSON.stringify(allProducts));
                
                currentProduct = allProducts.find(x => String(x.id) === String(productId));

                if (currentProduct) {
                    renderProduct(currentProduct, allProducts);
                    updateWhatsAppLink(currentProduct);
                    document.getElementById('loader').style.display = 'none';
                } else {
                    alert("Product Not Found!");
                    window.location.href = "index.html";
                }
            } catch (e) {
                console.error("Error:", e);
                // Try to load from cache if network fails
                const cached = JSON.parse(localStorage.getItem('myProducts'));
                if(cached){
                    currentProduct = cached.find(x => String(x.id) === String(productId));
                    if(currentProduct) {
                        renderProduct(currentProduct, cached);
                        document.getElementById('loader').style.display = 'none';
                        return;
                    }
                }
                alert("Network Connection Error!");
            }
        }

        function renderProduct(product, allProducts) {
            document.getElementById('pName').innerText = product.name;
            document.getElementById('pPrice').innerText = '₹' + product.price;
            document.getElementById('pCat').innerText = product.category || "Premium";
            
            const discount = 40; 
            const oldPrice = Math.round(product.price / (1 - discount/100));
            document.getElementById('pOld').innerText = '₹' + oldPrice;
            document.getElementById('pOff').innerText = discount + "% OFF";

            // Gallery Setup
            const allPhotos = [product.mainImg, ...(product.gallery || [])].filter(url => url && String(url).trim() !== "");
            const uniquePhotos = [...new Set(allPhotos)].slice(0, 7);
            document.getElementById('mainDisplay').src = uniquePhotos[0];

            uniquePhotos.forEach((src, i) => {
                const thumb = document.createElement('div');
                thumb.className = `thumb-card ${i === 0 ? 'active' : ''}`;
                thumb.innerHTML = `<img src="${src}">`;
                thumb.onclick = () => {
                    document.getElementById('mainDisplay').src = src;
                    document.querySelectorAll('.thumb-card').forEach(t => t.classList.remove('active'));
                    thumb.classList.add('active');
                };
                document.getElementById('thumbRow').appendChild(thumb);
            });

            // Size Selection Logic
            const cat = (product.category || "").toUpperCase();
            const sizeTrigger = ['SAREE', 'KURTIS', 'KURTIS & DRESS', 'WESTERN', 'DRESS'];
            if(sizeTrigger.some(el => cat.includes(el))) {
                document.getElementById('sizeArea').style.display = 'block';
                const sizes = cat.includes('SAREE') ? ["Free Size"] : ["S", "M", "L", "XL", "XXL"];
                sizes.forEach(sz => {
                    const btn = document.createElement('button');
                    btn.className = "btn-size";
                    btn.innerText = sz;
                    btn.onclick = () => {
                        document.querySelectorAll('.btn-size').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        selectedSize = sz;
                        updateWhatsAppLink(product);
                    };
                    document.getElementById('sizeOptions').appendChild(btn);
                });
            }

            // Related Grid
            const similar = allProducts.filter(p => p.category === product.category && p.id != product.id).slice(0, 4);
            similar.forEach(sp => {
                const item = document.createElement('div');
                item.className = 'rel-item';
                item.style.cssText = "background:white; border-radius:12px; overflow:hidden; border:1px solid #eee; cursor:pointer;";
                item.onclick = () => window.location.href = `details.html?id=${sp.id}`;
                item.innerHTML = `
                    <img src="${sp.mainImg}" style="width:100%; height:150px; object-fit:cover;">
                    <div style="padding:8px;">
                        <div style="font-size:11px; font-weight:600; height:30px; overflow:hidden;">${sp.name}</div>
                        <div style="color:var(--primary); font-weight:800; font-size:14px;">₹${sp.price}</div>
                    </div>`;
                document.getElementById('relatedGrid').appendChild(item);
            });
        }

        function updateWhatsAppLink(product) {
            const waBtn = document.getElementById('waFloatingBtn');
            const sizeInfo = selectedSize ? `\n📏 Size: ${selectedSize}` : "";
            const text = encodeURIComponent(
                `नमस्ते Al Akasha Elvy! 👋\n\nमुझे यह पसंद है:\n🛍️ नाम: ${product.name}\n💰 कीमत: ₹${product.price}${sizeInfo}\n🔗 लिंक: ${window.location.href}`
            );
            waBtn.href = `https://wa.me/917851053736?text=${text}`;
        }

        function shareProduct() {
            if (navigator.share) {
                navigator.share({ title: document.getElementById('pName').innerText, url: window.location.href });
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert("Link Copied!");
            }
        }

        document.getElementById('addToCartBtn').onclick = () => {
            if (document.getElementById('sizeArea').style.display === "block" && !selectedSize) { 
                alert("Please select Size! 📏"); return; 
            }
            let cart = JSON.parse(localStorage.getItem('myCart')) || [];
            cart.push({...currentProduct, selectedSize});
            localStorage.setItem('myProducts', JSON.stringify(cart)); // Keeping cache updated
            localStorage.setItem('myCart', JSON.stringify(cart));
            alert("Added to Bag! 🛒");
        };

        document.getElementById('buyNowBtn').onclick = () => {
            if (document.getElementById('sizeArea').style.display === "block" && !selectedSize) { 
                alert("Please select Size! 📏"); return; 
            }
            localStorage.setItem('buyNowItem', JSON.stringify({...currentProduct, selectedSize}));
            window.location.href = 'address.html';
        };

        init();
    </script>
</body>
</html>
