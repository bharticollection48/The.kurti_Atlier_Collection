<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Kurti Atelier - Luxe Collection</title>
    
    <link rel="icon" type="image/png" href="https://img.freepik.com/premium-vector/shopping-logo-vector-icon_636116-200.jpg?semt=ais_hybrid&w=740&q=80"> 
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --primary: #f3047c; 
            --premium-black: #121212;
            --glass: rgba(255, 255, 255, 0.8);
            --gold: #d4af37;
            --wa-green: #25d366; 
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            background: #f8f9fb; 
            color: var(--premium-black); 
            user-select: none; 
            overflow-x: hidden;
        }

        /* Luxury Header */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 20px; background: var(--glass); 
            backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .brand-name { 
            font-family: 'Playfair Display', serif;
            font-size: 18px; font-weight: 800; letter-spacing: 1px;
            color: var(--premium-black); text-transform: uppercase;
        }

        /* Premium Gallery */
        .gallery-section { background: white; padding-bottom: 20px; }
        .main-img-box { 
            width: 100%; height: 550px; background: #fff;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }
        .main-img-box img { 
            width: 100%; height: 100%; object-fit: cover;
            transition: 0.5s ease;
        }

        .thumb-row { 
            display: flex; gap: 12px; padding: 0 20px; 
            margin-top: -30px; position: relative; z-index: 10;
            overflow-x: auto; scrollbar-width: none;
        }
        .thumb-card { 
            min-width: 70px; height: 70px; border-radius: 12px; 
            border: 3px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow: hidden; cursor: pointer; transition: 0.3s;
        }
        .thumb-card.active { border-color: var(--primary); transform: scale(1.1); }

        /* Content Styles */
        .content-box { 
            padding: 30px 20px; background: white; 
            border-radius: 35px 35px 0 0; margin-top: -20px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.03);
        }

        .price-container { display: flex; align-items: center; gap: 15px; margin: 15px 0; }
        .current-price { font-size: 32px; font-weight: 800; color: #000; }
        .old-price { font-size: 18px; color: #999; text-decoration: line-through; }
        .discount-tag { 
            background: #fff0f6; color: var(--primary);
            padding: 4px 12px; border-radius: 8px; font-weight: 700; font-size: 14px;
        }

        /* Selection Options */
        .option-group { margin-bottom: 25px; }
        .label { font-weight: 700; font-size: 14px; text-transform: uppercase; margin-bottom: 15px; color: #666; display: block; }
        
        /* Color Swatches */
        .color-wrapper { display: flex; gap: 15px; }
        .color-dot { 
            width: 38px; height: 38px; border-radius: 50%; 
            border: 2px solid white; box-shadow: 0 0 0 1px #eee;
            cursor: pointer; position: relative; transition: 0.3s;
        }
        .color-dot.active { box-shadow: 0 0 0 2px var(--primary); }
        .color-dot.active::after {
            content: '\f00c'; font-family: 'Font Awesome 6 Free'; font-weight: 900;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-size: 12px; text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        }

        /* Size Chips */
        .size-wrapper { display: flex; gap: 10px; flex-wrap: wrap; }
        .size-btn { 
            padding: 10px 20px; border-radius: 12px; border: 1.5px solid #eee;
            background: white; font-weight: 600; transition: 0.3s;
        }
        .size-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* Stock Progress */
        .stock-bar { height: 8px; background: #f0f0f0; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .stock-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #ff75b5); width: 80%; }

        /* Full Category Section */
        .category-section { padding: 20px; background: #fff; }
        .scroll-grid { 
            display: flex; gap: 15px; overflow-x: auto; 
            padding-bottom: 20px; scrollbar-width: none;
        }
        .product-card { 
            min-width: 160px; background: #fff; border-radius: 15px; 
            border: 1px solid #f2f2f2; overflow: hidden;
        }

        /* Bottom Bar */
        .bottom-bar { 
            position: fixed; bottom: 0; width: 100%; 
            background: white; display: flex; padding: 15px 20px; 
            gap: 12px; box-shadow: 0 -10px 40px rgba(0,0,0,0.08);
            z-index: 1000; box-sizing: border-box;
        }
        .btn-luxe { 
            flex: 1; height: 55px; border-radius: 15px; border: none;
            font-weight: 700; font-size: 15px; display: flex;
            align-items: center; justify-content: center; gap: 8px; transition: 0.3s;
        }
        .btn-bag { background: #f8f8f8; color: #000; border: 1px solid #ddd; }
        .btn-order { background: var(--primary); color: white; box-shadow: 0 10px 20px rgba(243, 4, 124, 0.2); }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .content-box > * { animation: fadeIn 0.6s ease forwards; }

        #loader { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="font-family: 'Playfair Display'; margin-top:20px; font-weight:700; color:var(--primary); letter-spacing:4px;">THE KURTI ATELIER</p>
    </div>

    <header>
        <div class="share-btn" onclick="goBack()"><i class="fa-solid fa-arrow-left"></i></div>
        <div class="brand-name">The Kurti Atelier</div>
        <div class="share-btn" onclick="shareProduct()"><i class="fa-solid fa-arrow-up-from-bracket"></i></div>
    </header>

    <div class="gallery-section">
        <div class="main-img-box">
            <img id="mainDisplay" src="" alt="Luxe Kurti">
        </div>
        <div class="thumb-row" id="thumbRow"></div>
    </div>

    <div class="content-box">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div style="color: var(--primary); font-weight: 700; font-size: 13px;"><i class="fa-solid fa-star"></i> TOP RATED LUXE</div>
            <div style="font-size: 12px; color: #777;"><i class="fa-solid fa-eye"></i> 142 watching now</div>
        </div>

        <h1 id="pName" style="font-size: 26px; margin: 10px 0; font-family: 'Playfair Display', serif;">Loading Luxury...</h1>

        <div class="price-container">
            <span class="current-price" id="pPrice">₹0</span>
            <span class="old-price" id="pOld">₹0</span>
            <span class="discount-tag" id="pOff">40% OFF</span>
        </div>

        <div class="option-group">
            <div style="display: flex; justify-content: space-between; font-size: 12px; font-weight: 700;">
                <span style="color: #d35400;">HURRY! ONLY 4 LEFT IN STOCK</span>
                <span>82% SOLD</span>
            </div>
            <div class="stock-bar"><div class="stock-fill"></div></div>
        </div>

        <div class="option-group">
            <span class="label">Select Color</span>
            <div class="color-wrapper">
                <div class="color-dot active" style="background: #f3047c;" onclick="selectColor(this, 'Rose Pink')"></div>
                <div class="color-dot" style="background: #1a1a1a;" onclick="selectColor(this, 'Midnight Black')"></div>
                <div class="color-dot" style="background: #2d5a27;" onclick="selectColor(this, 'Emerald Green')"></div>
                <div class="color-dot" style="background: #0984e3;" onclick="selectColor(this, 'Royal Blue')"></div>
            </div>
        </div>

        <div id="sizeArea" class="option-group" style="display:none;">
            <span class="label">Select Size</span>
            <div id="sizeOptions" class="size-wrapper"></div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 30px 0;">
            <div style="background: #fdfdfd; padding: 15px; border-radius: 15px; border: 1px solid #eee;">
                <i class="fa-solid fa-truck-fast" style="color: var(--gold);"></i>
                <div style="font-size: 12px; font-weight: 700; margin-top: 5px;">FREE DELIVERY</div>
                <div style="font-size: 10px; color: #999;">On this premium order</div>
            </div>
            <div style="background: #fdfdfd; padding: 15px; border-radius: 15px; border: 1px solid #eee;">
                <i class="fa-solid fa-rotate-left" style="color: var(--gold);"></i>
                <div style="font-size: 12px; font-weight: 700; margin-top: 5px;">EASY EXCHANGE</div>
                <div style="font-size: 10px; color: #999;">7-day doorstep pickup</div>
            </div>
        </div>
    </div>

    <div class="category-section">
        <h3 style="font-family: 'Playfair Display'; margin-bottom: 20px;">More from this Category</h3>
        <div id="relatedGrid" class="scroll-grid">
            </div>
    </div>

    <div style="height: 120px;"></div>

    <a id="waFloatingBtn" href="#" target="_blank" style="display:none;"></a>

    <div class="bottom-bar">
        <button class="btn-luxe btn-bag" id="addToCartBtn"><i class="fa-solid fa-bag-shopping"></i> BAG</button>
        <button class="btn-luxe btn-order" id="buyNowBtn"><i class="fa-solid fa-bolt"></i> BUY NOW</button>
    </div>

    <script>
        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbw9rKH_KHDEl-STw0E1CoAL_xdqud4TMb22xccZFsNBN0xHY-pBQOCLYA3D6E8dzfgi/exec";
        const params = new URLSearchParams(window.location.search);
        const productId = params.get('id');
        let currentProduct = null;
        let selectedSize = "";
        let selectedColor = "Rose Pink";

        function goBack() { window.history.back(); }

        function selectColor(el, color) {
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
            selectedColor = color;
            updateWhatsAppLink(currentProduct);
        }

        async function init() {
            try {
                const response = await fetch(GOOGLE_SHEET_URL + "?t=" + Date.now());
                const data = await response.json();
                const allProducts = data.products || data;
                localStorage.setItem('myProducts', JSON.stringify(allProducts));
                
                currentProduct = allProducts.find(x => String(x.id) === String(productId));

                if (currentProduct) {
                    renderProduct(currentProduct, allProducts);
                    document.getElementById('loader').style.display = 'none';
                }
            } catch (e) {
                console.error("Load Error", e);
            }
        }

        function renderProduct(product, allProducts) {
            document.getElementById('pName').innerText = product.name;
            document.getElementById('pPrice').innerText = '₹' + product.price;
            document.getElementById('pOld').innerText = '₹' + Math.round(product.price / 0.6);
            
            const photos = [product.mainImg, ...(product.gallery || [])].filter(Boolean);
            document.getElementById('mainDisplay').src = photos[0];

            photos.forEach((src, i) => {
                const thumb = document.createElement('div');
                thumb.className = `thumb-card ${i === 0 ? 'active' : ''}`;
                thumb.innerHTML = `<img src="${src}">`;
                thumb.onclick = () => {
                    document.getElementById('mainDisplay').src = src;
                    document.querySelectorAll('.thumb-card').forEach(t => t.classList.remove('active'));
                    thumb.classList.add('active');
                };
                document.getElementById('thumbRow').appendChild(thumb);
            });

            // Sizes
            const cat = (product.category || "").toUpperCase();
            if(['KURTIS', 'SAREE', 'WESTERN', 'DRESS'].some(el => cat.includes(el))) {
                document.getElementById('sizeArea').style.display = 'block';
                const sizes = cat.includes('SAREE') ? ["Free Size"] : ["S", "M", "L", "XL", "XXL"];
                sizes.forEach(sz => {
                    const btn = document.createElement('button');
                    btn.className = "size-btn";
                    btn.innerText = sz;
                    btn.onclick = () => {
                        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        selectedSize = sz;
                        updateWhatsAppLink(product);
                    };
                    document.getElementById('sizeOptions').appendChild(btn);
                });
            }

            // LOAD ALL PRODUCTS FROM SAME CATEGORY
            const related = allProducts.filter(p => p.category === product.category && p.id != product.id);
            const grid = document.getElementById('relatedGrid');
            
            if(related.length === 0) {
                document.querySelector('.category-section').style.display = 'none';
            }

            related.forEach(sp => {
                const div = document.createElement('div');
                div.className = "product-card";
                div.onclick = () => window.location.href = `details.html?id=${sp.id}`;
                div.innerHTML = `
                    <img src="${sp.mainImg}" style="width:100%; height:180px; object-fit:cover;">
                    <div style="padding:10px;">
                        <div style="font-size:11px; font-weight:700; height:32px; overflow:hidden;">${sp.name}</div>
                        <div style="color:var(--primary); font-weight:800; margin-top:5px;">₹${sp.price}</div>
                    </div>
                `;
                grid.appendChild(div);
            });

            updateWhatsAppLink(product);
        }

        function updateWhatsAppLink(product) {
            const sizeMsg = selectedSize ? `\n📏 साइज: ${selectedSize}` : "";
            const text = encodeURIComponent(`नमस्ते The Kurti Atelier! 👋\n\nमुझे यह प्रीमियम कुर्ती पसंद आई है:\n🛍️ नाम: ${product.name}\n🎨 कलर: ${selectedColor}${sizeMsg}\n💰 कीमत: ₹${product.price}\n\nकृपया मेरा ऑर्डर कन्फर्म करें।`);
            document.getElementById('buyNowBtn').onclick = () => {
                if(document.getElementById('sizeArea').style.display === "block" && !selectedSize) {
                    alert("कृपया अपना साइज चुनें ✨");
                    return;
                }
                window.location.href = `https://wa.me/917851053736?text=${text}`;
            };
        }

        init();
    </script>
</body>
</html>
